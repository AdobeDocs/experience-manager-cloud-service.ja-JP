name: Mirror

on:
  push:
    branches:
      - main

jobs:
  mirror-to-public:
    # Skip on the public AdobeDocs mirror: this file gets mirrored along with the rest
    # of the tree, but it must only run in the source (localized) repo, never on the
    # public copy where it would attempt to mirror onto itself.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner != 'AdobeDocs'
    # TODO(maintainer): If your org uses a different reusable workflow repo, replace Adobe-Enterprise-Docs/workflows.
    # TODO(maintainer): Pin to a commit SHA for stronger supply-chain security instead of @main.
    uses: Adobe-Enterprise-Docs/workflows/.github/workflows/mirror-to-public-localized.yml@main
    # TODO(maintainer): Ensure ALL FOUR org-level GitHub App secrets are available:
    #   - ADOBEDOCS_MIRRORING_APP_ID / ADOBEDOCS_MIRRORING_APP_PRIVATE_KEY (push to public mirror)
    #   - WORKFLOWS_ASSETS_APP_ID / WORKFLOWS_ASSETS_APP_PRIVATE_KEY (read private workflows repo assets)
    secrets: inherit
    with:
      # TODO(maintainer): Set the GitHub team slug that owns issues/PRs for this localized repo
      # (replaces __TEAM_SLUG__ in the shared assign-issue.yml / assign-pr.yml templates).
      # Examples: sccm-loc-vendors-de-de, sccm-loc-vendors-fr-fr, sccm-loc-vendors-pt-br.
      locale-team-slug: sccm-loc-vendors-ja-jp
      # TODO(maintainer): If public target differs from AdobeDocs/<this-repo-name>, pass:
      # mirror-target-repository: <owner>/<repo>
