<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="Arial,Helvetica,sans-serif">
<defs>
  <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0 0 8 3 0 6z" fill="#555"/>
  </marker>
  <style>
    text{font-family:Arial,Helvetica,sans-serif;font-size:10px;fill:#222}
    .h1{font-size:14px;font-weight:700;fill:#111}
    .hdr{font-size:10.5px;font-weight:700;fill:#fff}
    .sub{font-size:9.5px;font-weight:700;fill:#0d4a7a}
    .sm{font-size:8.5px;fill:#444}
    .dim{font-size:8px;fill:#777}
    .ar{fill:none;stroke:#555;stroke-width:1.5;marker-end:url(#a)}
    .bus{fill:none;stroke:#aaa;stroke-width:1}
  </style>
</defs>

<!-- ░░ background ░░ -->
<rect width="960" height="660" fill="#fff"/>

<!-- ░░ title ░░ -->
<text x="480" y="24" class="h1" text-anchor="middle">AEM Forms as a Cloud Service — Communications Architecture</text>

<!-- ░░ CDN ░░ -->
<rect x="355" y="36" width="250" height="36" rx="5" fill="#e8f4fc" stroke="#0072c6" stroke-width="1.5"/>
<text x="480" y="58" text-anchor="middle" font-weight="bold" fill="#0d4a7a">CDN (Content Delivery Network)</text>

<!-- CDN → Dispatcher (straight down) -->
<line x1="480" y1="72" x2="480" y2="90" class="ar"/>

<!-- ░░ Dispatcher ░░ -->
<rect x="375" y="90" width="210" height="32" rx="5" fill="#d4e8f8" stroke="#0072c6" stroke-width="1.5"/>
<text x="480" y="111" text-anchor="middle" font-weight="bold" fill="#0d4a7a">Dispatcher</text>

<!-- Dispatcher → Author (angled left, stays in gap between boxes) -->
<path d="M420 122 L200 148" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>
<!-- Dispatcher → Publish (angled right) -->
<path d="M540 122 L760 148" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#a)"/>

<!-- ░░░░░░░░░░░░ AUTHOR INSTANCE ░░░░░░░░░░░░ -->
<rect x="30" y="148" width="335" height="236" rx="6" fill="#e8f4fc" stroke="#0072c6" stroke-width="2"/>
<rect x="30" y="148" width="335" height="26" rx="6" fill="#0072c6"/>
<rect x="30" y="163" width="335" height="11" fill="#0072c6"/>
<text x="197" y="166" class="hdr" text-anchor="middle">Author Instance</text>

<rect x="44" y="185" width="307" height="48" rx="4" fill="#fff" stroke="#b8d9f0" stroke-width="1"/>
<text x="197" y="201" class="sub" text-anchor="middle">Output Service</text>
<text x="197" y="214" class="sm" text-anchor="middle">Communications — Document Generation APIs</text>
<text x="197" y="226" class="sm" text-anchor="middle">Personalized documents: letters, bills, notices, welcome kits</text>

<rect x="44" y="239" width="307" height="48" rx="4" fill="#fff" stroke="#b8d9f0" stroke-width="1"/>
<text x="197" y="255" class="sub" text-anchor="middle">Assembler Service</text>
<text x="197" y="268" class="sm" text-anchor="middle">Communications — Document Manipulation APIs</text>
<text x="197" y="280" class="sm" text-anchor="middle">Combine, rearrange and validate PDF documents</text>

<rect x="44" y="293" width="307" height="80" rx="4" fill="#fff" stroke="#b8d9f0" stroke-width="1"/>
<text x="197" y="309" class="sub" text-anchor="middle">Author APIs</text>
<text x="197" y="322" class="sm" text-anchor="middle">Synchronous RESTful (Real-time) APIs</text>
<text x="197" y="334" class="sm" text-anchor="middle">Batch APIs for high-volume document generation</text>
<text x="197" y="346" class="sm" text-anchor="middle">Manage Communications assets · Connect to AFCS</text>
<text x="197" y="358" class="sm" text-anchor="middle">Combine, rearrange and validate PDF documents</text>

<!-- ░░░░░░░░░░░░ PUBLISH INSTANCE ░░░░░░░░░░░░ -->
<rect x="595" y="148" width="335" height="236" rx="6" fill="#e8f4fc" stroke="#0072c6" stroke-width="2"/>
<rect x="595" y="148" width="335" height="26" rx="6" fill="#0072c6"/>
<rect x="595" y="163" width="335" height="11" fill="#0072c6"/>
<text x="762" y="166" class="hdr" text-anchor="middle">Publish Instance</text>

<rect x="609" y="185" width="307" height="48" rx="4" fill="#fff" stroke="#b8d9f0" stroke-width="1"/>
<text x="762" y="201" class="sub" text-anchor="middle">Output Service</text>
<text x="762" y="214" class="sm" text-anchor="middle">Communications — Document Generation APIs</text>
<text x="762" y="226" class="sm" text-anchor="middle">Render and deliver personalized communications</text>

<rect x="609" y="239" width="307" height="48" rx="4" fill="#fff" stroke="#b8d9f0" stroke-width="1"/>
<text x="762" y="255" class="sub" text-anchor="middle">Assembler Service</text>
<text x="762" y="268" class="sm" text-anchor="middle">Communications — Document Manipulation APIs</text>
<text x="762" y="280" class="sm" text-anchor="middle">Combine, rearrange and validate PDF documents</text>

<rect x="609" y="293" width="307" height="80" rx="4" fill="#fff" stroke="#b8d9f0" stroke-width="1"/>
<text x="762" y="309" class="sub" text-anchor="middle">Publish APIs</text>
<text x="762" y="322" class="sm" text-anchor="middle">Synchronous APIs — create, assemble and deliver</text>
<text x="762" y="334" class="sm" text-anchor="middle">Brand-oriented personalized communications</text>
<text x="762" y="346" class="sm" text-anchor="middle">Combine, rearrange and validate PDF documents</text>
<text x="762" y="358" class="sm" text-anchor="middle">Transport raw data to system-of-record</text>

<!-- no reverse replication dashed label -->
<path d="M365 262 L595 262" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3"/>
<text x="480" y="259" class="dim" text-anchor="middle">no reverse replication</text>

<!-- ░░░░ VERTICAL DROPS to bus line ░░░░ -->
<!-- Author bottom → bus -->
<line x1="197" y1="384" x2="197" y2="406" class="bus"/>
<!-- Publish bottom → bus -->
<line x1="762" y1="384" x2="762" y2="406" class="bus"/>

<!-- ░░░░ HORIZONTAL BUS ░░░░ -->
<line x1="70" y1="406" x2="900" y2="406" class="bus"/>

<!-- ░░░░ BUS → SERVICE CONNECTORS (all straight down) ░░░░ -->
<line x1="115" y1="406" x2="115" y2="420" class="bus"/>
<line x1="350" y1="406" x2="350" y2="420" class="bus"/>
<line x1="566" y1="406" x2="566" y2="420" class="bus"/>
<line x1="820" y1="406" x2="820" y2="420" class="bus"/>

<!-- arrowheads at box tops -->
<path d="M112 418 l3-6 3 6z" fill="#aaa"/>
<path d="M347 418 l3-6 3 6z" fill="#aaa"/>
<path d="M563 418 l3-6 3 6z" fill="#aaa"/>
<path d="M817 418 l3-6 3 6z" fill="#aaa"/>

<!-- ░░░░░░ SERVICE BOXES ░░░░░░ -->

<!-- Cloud Manager -->
<rect x="20" y="420" width="190" height="100" rx="6" fill="#f4f7fb" stroke="#7aa3c4" stroke-width="1.5"/>
<rect x="20" y="420" width="190" height="22" rx="6" fill="#3a7db0"/>
<rect x="20" y="432" width="190" height="10" fill="#3a7db0"/>
<text x="115" y="435" class="hdr" text-anchor="middle">Cloud Manager</text>
<text x="115" y="456" class="sm" text-anchor="middle">Program &amp; Environment Management</text>
<text x="115" y="468" class="sm" text-anchor="middle">CI/CD Pipeline · Build &amp; Deploy</text>
<text x="115" y="480" class="sm" text-anchor="middle">Developer Console</text>
<text x="115" y="492" class="sm" text-anchor="middle">Creating &amp; managing AEM environments</text>

<!-- DoR Service -->
<rect x="220" y="420" width="260" height="100" rx="6" fill="#f4f7fb" stroke="#7aa3c4" stroke-width="1.5"/>
<rect x="220" y="420" width="260" height="22" rx="6" fill="#3a7db0"/>
<rect x="220" y="432" width="260" height="10" fill="#3a7db0"/>
<text x="350" y="435" class="hdr" text-anchor="middle">Document of Record (DoR) Service</text>
<text x="350" y="456" class="sm" text-anchor="middle">Runs in its own dedicated pods</text>
<text x="350" y="468" class="sm" text-anchor="middle">Separate from Author and Publish instances</text>
<text x="350" y="480" class="sm" text-anchor="middle">Scales independently based on load</text>
<text x="350" y="492" class="sm" text-anchor="middle">Generates Document of Record (PDF)</text>

<!-- Adobe Services -->
<rect x="490" y="420" width="300" height="100" rx="6" fill="#f2f5f9" stroke="#8ea8bf" stroke-width="1.5"/>
<rect x="490" y="420" width="300" height="22" rx="6" fill="#5a7fa0"/>
<rect x="490" y="432" width="300" height="10" fill="#5a7fa0"/>
<text x="640" y="435" class="hdr" text-anchor="middle">Adobe Services</text>
<rect x="502" y="446" width="128" height="64" rx="4" fill="#fff" stroke="#c5d8e8" stroke-width="1"/>
<text x="566" y="463" class="sub" text-anchor="middle">Adobe Sign</text>
<text x="566" y="476" class="sm" text-anchor="middle">Cloud-based e-signature</text>
<text x="566" y="488" class="sm" text-anchor="middle">E-sign communications</text>
<rect x="642" y="446" width="136" height="64" rx="4" fill="#fff" stroke="#c5d8e8" stroke-width="1"/>
<text x="710" y="463" class="sub" text-anchor="middle">Automated Forms</text>
<text x="710" y="476" class="sm" text-anchor="middle">Conversion Service</text>
<text x="710" y="488" class="sm" text-anchor="middle">PDF/XFA → Adaptive Forms</text>

<!-- Customer Managed Storage -->
<rect x="800" y="420" width="145" height="100" rx="6" fill="#f2f5f9" stroke="#8ea8bf" stroke-width="1.5"/>
<rect x="800" y="420" width="145" height="22" rx="6" fill="#5a7fa0"/>
<rect x="800" y="432" width="145" height="10" fill="#5a7fa0"/>
<text x="872" y="435" class="hdr" text-anchor="middle">Storage</text>
<text x="872" y="456" class="sm" text-anchor="middle">Blob Store · Database</text>
<text x="872" y="468" class="sm" text-anchor="middle">Unified Storage</text>
<text x="872" y="480" class="sm" text-anchor="middle">Connector (USC)</text>
<text x="872" y="492" class="sm" text-anchor="middle">Form Data Model (FDM)</text>

<!-- ░░ footnotes ░░ -->
<text x="480" y="546" class="dim" text-anchor="middle">Author: internal users, designers, developers.  Publish: end-user facing — delivers communications to customers.</text>
<text x="480" y="558" class="dim" text-anchor="middle">DoR Service runs in its own pods for independent scaling.  No reverse replication from Publish to Author.</text>
<text x="480" y="570" class="dim" text-anchor="middle">Customer Managed Storage: connect via Unified Storage Connector (Blob) or Form Data Model / FDM (databases, RESTful, SOAP, Azure Blob).</text>
</svg>
